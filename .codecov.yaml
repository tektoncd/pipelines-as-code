coverage:
  # Commit status https://docs.codecov.io/docs/commit-status are used
  # to block PR based on coverage threshold.
  status:
    project:
      default:
        target: auto
        threshold: 5%
    patch:
      # Disable the coverage threshold of the patch, so that PRs are
      # only failing because of overall project coverage threshold.
      # See https://docs.codecov.io/docs/commit-status#disabling-a-status.
      default: false

flag_management:
  individual_flags:
    - name: unit-tests
      carryforward: false
    # The e2e workflow is path-filtered and does not run on every PR;
    # carryforward reuses the last e2e report instead of showing a
    # coverage drop when it did not run.
    - name: e2e
      carryforward: true

ignore:
  - "**/zz_generated*.go"
  - "**/*.pb.go"
  - "hack"
  - "pkg/generated"
  - "pkg/apis"
  - "cmd/*"
  - "test"
  - "pkg/test"
  - "pkg/provider/**/test"
  - "third_party"
  - "vendor"
